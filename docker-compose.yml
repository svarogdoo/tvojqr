services:
  postgres:
    image: postgres:16-alpine
    container_name: hostingqr-postgres
    environment:
      POSTGRES_DB: hostingqr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - hostingqr-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hostingqr"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  hostingqr-postgres-data:
